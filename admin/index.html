<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tinaht Content Manager</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/images/logos/favicon-source.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:wght@400;500;700&family=Montserrat:wght@500;600;800&family=Roboto+Condensed:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="admin-gate" class="admin-gate">
    <div class="admin-gate__card">
      <h2>Admin Panel</h2>
      <p>Enter your password to access the content manager.</p>
      <form id="gate-form" class="admin-gate__form">
        <input type="password" id="gate-password" class="form-input" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <p id="gate-error" class="admin-gate__error">Incorrect password. Please try again.</p>
      </form>
    </div>
  </div>

  <!-- ADMIN HEADER -->
  <header class="admin-header">
    <div class="container">
      <div class="admin-header__left">
        <a href="../" class="site-logo"><span class="site-logo__text">Tinaht</span></a>
        <span class="admin-header__badge">Admin</span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
    </div>
  </header>

  <!-- ADMIN BODY -->
  <div id="admin-body" class="admin-body">
    <div class="container">

      <!-- TABS -->
      <div class="admin-tabs">
        <button class="filter-btn is-active" data-tab="blogs">Blog Posts</button>
        <button class="filter-btn" data-tab="testimonials">Testimonials</button>
        <button class="filter-btn" data-tab="team">Team Members</button>
      </div>

      <!-- PUBLISH BAR -->
      <div class="admin-publish-bar">
        <button id="publish-btn" class="btn btn-publish">&#x1F680; Publish to Live Site</button>
        <span id="publish-status" class="admin-publish-status"></span>
        <button id="github-setup-btn" class="btn btn-secondary btn-sm" title="GitHub Token Setup">&#x2699; GitHub Setup</button>
      </div>

      <!-- ACTION BAR -->
      <div class="admin-actions">
        <button id="add-btn" class="btn btn-primary">+ Add New</button>
        <button id="seed-btn" class="btn btn-secondary">Seed Defaults</button>
        <button id="export-btn" class="btn btn-secondary">Export JSON</button>
        <button id="import-btn" class="btn btn-secondary">Import JSON</button>
        <input type="file" id="import-file" accept=".json">
        <button id="clear-btn" class="btn btn-danger btn-secondary">Clear All Data</button>
      </div>

      <!-- CONTENT GRID -->
      <div id="admin-content" class="admin-grid"></div>

    </div>
  </div>

  <!-- MODAL -->
  <div id="admin-modal" class="admin-modal">
    <div class="admin-modal__backdrop"></div>
    <div class="admin-modal__content">
      <div class="admin-modal__header">
        <h2 id="modal-title">Add Item</h2>
        <button class="admin-modal__close" aria-label="Close">&times;</button>
      </div>
      <form id="modal-form" class="admin-form"></form>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div id="admin-confirm" class="admin-confirm">
    <div class="admin-confirm__backdrop"></div>
    <div class="admin-confirm__content">
      <h3>Delete Item</h3>
      <p id="confirm-message">Are you sure you want to delete this item? This cannot be undone.</p>
      <div class="admin-confirm__actions">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-delete" class="btn btn-danger btn-secondary">Delete</button>
      </div>
    </div>
  </div>

  <!-- GITHUB SETUP MODAL -->
  <div id="github-setup-modal" class="admin-modal">
    <div class="admin-modal__backdrop"></div>
    <div class="admin-modal__content">
      <div class="admin-modal__header">
        <h2>GitHub Token Setup</h2>
        <button class="admin-modal__close" aria-label="Close">&times;</button>
      </div>
      <form id="github-setup-form" class="admin-form">
        <div class="form-group">
          <label for="gh-token">Personal Access Token *</label>
          <input type="password" id="gh-token" class="form-input" required placeholder="ghp_xxxxxxxxxxxx">
          <p class="form-hint">Create a token at <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--color-primary)">github.com/settings/tokens</a> with <strong>repo</strong> scope.</p>
        </div>
        <div class="admin-form__footer">
          <button type="button" class="btn btn-secondary github-setup-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Token</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/data-manager.js?v=3"></script>
  <script src="../js/admin.js?v=3"></script>
</body>
</html>
